[workspace]
authors = ["Luthfi <luthfillahatar@gmail.com>"]
channels = ["conda-forge"]
name = "whatsapp-chatbot"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
dev = "uvicorn app.main:app --reload"
start = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
test = "pytest"
dashboard = "streamlit run owner_dashboard.py --server.port 8501"

[dependencies]
python = "3.10.*"
ipykernel = ">=7.3.0,<8"
matplotlib = ">=3.10.9,<4"
seaborn = ">=0.13.2,<0.14"
tabulate = ">=0.10.0,<0.11"

[pypi-dependencies]
fastapi = ">=0.110.0"
uvicorn = { version = ">=0.28.0", extras = ["standard"] }
pydantic = ">=2.6.0"
pydantic-settings = ">=2.2.0"
openai = ">=1.14.0"
sqlalchemy = ">=2.0.25"
google-api-python-client = ">=2.120.0"
google-auth-httplib2 = ">=0.2.0"
google-auth-oauthlib = ">=1.2.0"
httpx = ">=0.27.0"
python-dotenv = ">=1.0.1"
pytest = ">=8.0.0"
pytest-asyncio = ">=0.23.0"
streamlit = ">=1.32.0"
psycopg2-binary = ">=2.9.9"
