name: Keep Hugging Face Space Awake

on:
  schedule:
    # Runs every 10 minutes (UTC) for maximum safety against cold starts
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FastAPI Health Endpoint
        run: |
          echo "Pinging Hugging Face server to prevent cold start sleep..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://luthfillah-whatsapp-chatbot-api.hf.space/health || echo "FAILED")
          echo "Response HTTP Status: $STATUS_CODE"
          if [ "$STATUS_CODE" != "200" ]; then
            echo "Warning: Server returned status $STATUS_CODE"
          else
            echo "Success: Server is awake and healthy!"
          fi
